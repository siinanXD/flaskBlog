<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuen Beitrag erstellen</title>
</head>
<body>
    <h1>Neuen Beitrag erstellen</h1>

    <form action="{{ url_for('add') }}" method="POST">
        <label for="title">Titel:</label><br>
        <input type="text" id="title" name="title" required><br><br>

        <label for="category">Kategorie:</label><br>
        <input type="text" id="category" name="category" placeholder="z. B. Programmierung" required><br><br>

        <label for="content">Inhalt:</label><br>
        <textarea id="content" name="content" rows="8" cols="50" required></textarea><br><br>

        <button type="submit">Speichern</button>
    </form>

    <br>
    <a href="{{ url_for('index') }}">Zurück zur Startseite</a>
</body>
</html>

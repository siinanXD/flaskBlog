<!DOCTYPE html>
<html>
<head>
    <title>Beitrag bearbeiten</title>
</head>
<body>

    <h1>Beitrag bearbeiten</h1>

    <form action="{{ url_for('update', post_id=post.id) }}" method="POST">
        <label for="title">Titel:</label><br>
        <input type="text" id="title" name="title" value="{{ post.title }}" required><br><br>

        <label for="content">Inhalt:</label><br>
        <textarea id="content" name="content" rows="6" required>{{ post.content }}</textarea><br><br>

        <button type="submit">Aktualisieren</button>
    </form>

    <br>
    <a href="{{ url_for('index') }}">Zurück zur Startseite</a>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
</head>
<body>
    <h1>Blog</h1>

    <p>
        <a href="{{ url_for('add') }}">+ Neuer Beitrag</a>
    </p>

    {% if posts %}
        <ul>
            {% for post in posts %}
                <li>
                    <h2>{{ post['title'] }}</h2>
                    <p>{{ post['content'] }}</p>

                    <a href="{{ url_for('update', post_id=post['id']) }}">
                        <button>Bearbeiten</button>
                    </a>

                    <a href="{{ url_for('delete', post_id=post['id']) }}">
                        <button>Löschen</button>
                    </a>
                </li>
                <hr>
            {% endfor %}
        </ul>
    {% else %}
        <p>Noch keine Blogbeiträge vorhanden.</p>
    {% endif %}
</body>
</html>
